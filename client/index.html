<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Blog | Premium Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="main-header">
      <div class="logo">
        <span class="logo-icon">✨</span>
        <h1>Nexus<span>Blog</span></h1>
      </div>
      <div class="search-bar">
        <input type="text" placeholder="Search insights...">
      </div>
      <div class="user-profile">
        <div class="avatar">JS</div>
      </div>
    </header>

    <main class="content-layout">
      <aside class="sidebar">
        <div class="card glass create-post-card">
          <h2>Create New Post</h2>
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="What's on your mind?">
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
              <option value="Technology">Technology</option>
              <option value="Design">Design</option>
              <option value="Lifestyle">Lifestyle</option>
              <option value="Development">Development</option>
            </select>
          </div>
          <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" placeholder="Share your thoughts..."></textarea>
          </div>
          <button class="btn btn-primary" onclick="createPost()">
            <span>Publish Post</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </div>

        <nav class="categories-nav">
          <h3>Trending Topics</h3>
          <ul>
            <li class="active">All Posts</li>
            <li>#Tech</li>
            <li>#Design</li>
            <li>#Future</li>
          </ul>
        </nav>
      </aside>

      <section class="feed">
        <div class="feed-header">
          <h2>Latest Insights</h2>
          <div class="filters">
            <button class="filter-btn active">Newest</button>
            <button class="filter-btn">Popular</button>
          </div>
        </div>
        
        <div id="posts-container" class="posts-grid">
          <!-- Posts will be injected here -->
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Gathering insights...</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Notification Toast -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
